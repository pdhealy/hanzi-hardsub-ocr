<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzi Hardsub Reader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1 class="popup-title">Hanzi Hardsub Reader</h1>
  <div class="status-wrapper" role="status" aria-live="polite">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-label" id="status-label">Inactive</span>
  </div>
  <hr class="divider">
  <div class="buttons">
    <button
      id="btn-draw"
      class="btn btn-secondary"
      aria-label="Draw subtitle area on the YouTube video"
    >Draw New Subtitle Area</button>
    <button
      id="btn-recognize"
      class="btn btn-primary"
      aria-label="Recognize text in the drawn area"
      disabled
    >Recognize Text</button>
  </div>
  <div class="presets-section" id="presets-section">
    <div class="presets-header">Presets</div>
    <ul id="preset-list" class="preset-list"></ul>
    <div id="save-preset-container" class="save-preset-container" style="display: none;">
      <input type="text" id="preset-name" placeholder="Preset name" class="preset-input">
      <button id="btn-save-preset" class="btn btn-secondary btn-small">Save</button>
    </div>
  </div>
  <script src="../dist/popup.bundle.js"></script>
</body>
</html>
